<div class="min-h-screen relative flex items-center justify-center bg-slate-900 overflow-hidden">
  
  <!-- Background Elements -->
  <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-indigo-500 rounded-full mix-blend-multiply filter blur-3xl opacity-70 animate-blob"></div>
  <div class="absolute top-[20%] right-[-10%] w-96 h-96 bg-purple-500 rounded-full mix-blend-multiply filter blur-3xl opacity-70 animate-blob animation-delay-2000"></div>
  <div class="absolute bottom-[-20%] left-[20%] w-96 h-96 bg-pink-500 rounded-full mix-blend-multiply filter blur-3xl opacity-70 animate-blob animation-delay-4000"></div>

  <!-- Login Card -->
  <div class="relative w-full max-w-md px-8 py-10 bg-white/10 backdrop-blur-xl border border-white/20 rounded-2xl shadow-2xl z-10">
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-gradient-to-tr from-indigo-500 to-purple-500 mb-4 shadow-lg">
        <i class="ph ph-headset text-3xl text-white"></i>
      </div>
      <h1 class="text-3xl font-bold text-white tracking-tight">CMEM HelpDesk</h1>
      <p class="text-slate-300 mt-2 text-sm">Plataforma de Suporte Técnico</p>
    </div>

    <!-- Error Message -->
    <div *ngIf="errorMessage" class="mb-4 bg-red-500/20 border border-red-500/50 p-3 rounded-lg text-red-200 text-sm flex items-center animate-[pulse_1s_ease-in-out]">
      <i class="ph ph-warning-circle text-lg mr-2 flex-shrink-0"></i>
      <span>{{ errorMessage }}</span>
    </div>

    <form (submit)="login()" class="space-y-6">
      <div>
        <label class="block text-sm font-medium text-slate-300 mb-1" for="email">Usuário ou E-mail</label>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
            <i class="ph ph-envelope text-slate-400 text-lg"></i>
          </div>
          <input 
            type="text" 
            id="email" 
            name="email"
            [(ngModel)]="email"
            class="block w-full pl-10 pr-3 py-2.5 border border-white/10 rounded-lg leading-5 bg-white/5 text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm transition-all" 
            placeholder="admin ou voce@cmem.com.br"
            required
          >
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-300 mb-1" for="password">Senha</label>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
            <i class="ph ph-lock text-slate-400 text-lg"></i>
          </div>
          <input 
            type="password" 
            id="password" 
            name="password"
            [(ngModel)]="password"
            class="block w-full pl-10 pr-3 py-2.5 border border-white/10 rounded-lg leading-5 bg-white/5 text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm transition-all" 
            placeholder="••••••••"
            required
          >
        </div>
      </div>

      <div class="flex items-center justify-between">
        <div class="flex items-center">
          <input id="remember-me" name="remember-me" type="checkbox" class="h-4 w-4 text-indigo-500 focus:ring-indigo-500 border-white/20 rounded bg-white/10">
          <label for="remember-me" class="ml-2 block text-sm text-slate-300">
            Lembrar-me
          </label>
        </div>

        <div class="text-sm">
          <a href="#" class="font-medium text-indigo-400 hover:text-indigo-300 transition-colors">
            Esqueceu a senha?
          </a>
        </div>
      </div>

      <div>
        <button 
          type="submit" 
          [disabled]="isLoading"
          class="group relative w-full flex justify-center py-2.5 px-4 border border-transparent text-sm font-medium rounded-lg text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-slate-900 focus:ring-indigo-500 transition-all overflow-hidden"
        >
          <span *ngIf="!isLoading">Entrar</span>
          <span *ngIf="isLoading" class="flex items-center">
            <i class="ph ph-spinner animate-spin mr-2"></i> Entrando...
          </span>
          <div class="absolute inset-0 h-full w-full bg-white/20 scale-x-0 group-hover:scale-x-100 transition-transform origin-left"></div>
        </button>
      </div>
    </form>
    
    <div class="mt-6 text-center text-sm text-slate-300 border-t border-white/10 pt-4">
      Não tem uma conta? 
      <a [routerLink]="['/cadastro']" class="font-medium text-indigo-400 hover:text-indigo-300 transition-colors">
        Cadastre-se aqui
      </a>
    </div>
  </div>
</div>
